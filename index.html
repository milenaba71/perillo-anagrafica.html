<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perillo Spa – Anagrafica | Mycroclean</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --blue:#1B4FD8; --blue-dk:#0A2540; --blue-lt:#DBEAFE; --teal:#0EA5E9;
      --gray-50:#F8FAFC; --gray-100:#F1F5F9; --gray-200:#E2E8F0;
      --gray-400:#94A3B8; --gray-600:#475569; --gray-800:#1E293B;
      --green-lt:#D1FAE5; --orange-lt:#FEF3C7; --red-lt:#FEE2E2;
    }
    body { font-family:'Inter',sans-serif; background:var(--gray-50); color:var(--gray-800); min-height:100vh; }

    /* HEADER */
    header {
      background:var(--blue-dk); display:flex; align-items:center; justify-content:space-between;
      padding:0 32px; height:68px; position:sticky; top:0; z-index:100;
      box-shadow:0 2px 14px rgba(0,0,0,.35);
    }
    .logo img { height:46px; object-fit:contain; display:block; }
    .header-right { font-size:.72rem; color:var(--gray-400); letter-spacing:.1em; text-transform:uppercase; }

    /* HERO */
    #hero {
      background:linear-gradient(120deg,var(--blue-dk) 0%,#1B4FD8 65%,var(--teal) 100%);
      padding:40px 32px 36px; color:#fff;
      display:flex; flex-direction:row; align-items:center; justify-content:space-between; gap:24px; flex-wrap:wrap;
    }
    .hero-eyebrow { font-size:.68rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--teal); margin-bottom:8px; }
    .hero-name { font-family:'Space Grotesk',sans-serif; font-size:2.3rem; font-weight:700; line-height:1.1; }
    .hero-pills { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
    .pill { display:inline-flex; align-items:center; gap:5px; padding:4px 13px; border-radius:999px; font-size:.75rem; font-weight:600; }
    .pill-blue  { background:rgba(255,255,255,.12); color:#93C5FD; border:1px solid rgba(255,255,255,.2); }
    .pill-green { background:rgba(16,185,129,.2); color:#6EE7B7; border:1px solid rgba(16,185,129,.3); }
    .hero-logo  { height:64px; object-fit:contain; }

    /* LOADING */
    #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 24px; color:var(--gray-400); gap:16px; }
    .spinner { width:44px; height:44px; border:3px solid var(--gray-200); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #error { display:none; text-align:center; padding:60px 24px; color:#EF4444; font-weight:500; }

    /* MAIN */
    main { max-width:960px; margin:0 auto; padding:36px 24px 80px; display:none; }
    .section-header { font-size:.68rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--blue); margin-bottom:16px; padding-bottom:8px; border-bottom:2px solid var(--blue-lt); }
    .section-block { margin-bottom:32px; }

    /* KPI */
    .kpi-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:32px; }
    .kpi { flex:1; min-width:140px; background:#fff; border:1px solid var(--gray-200); border-radius:10px; padding:20px; text-align:center; }
    .kpi-val { font-family:'Space Grotesk',sans-serif; font-size:1.85rem; font-weight:700; color:var(--blue-dk); }
    .kpi-lbl { font-size:.68rem; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--gray-400); margin-top:4px; }

    /* GRID */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
    .card { background:#fff; border:1px solid var(--gray-200); border-radius:10px; padding:20px; transition:box-shadow .15s; }
    .card:hover { box-shadow:0 4px 20px rgba(27,79,216,.1); }
    .card-lbl { font-size:.68rem; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--gray-400); margin-bottom:4px; }
    .card-val { font-size:1rem; font-weight:500; color:var(--gray-800); word-break:break-word; }
    .card-val.mono { font-family:'Space Grotesk',monospace; }
    .empty { color:var(--gray-400); font-style:italic; font-size:.85rem; }

    /* TABLE */
    .table-wrap { overflow-x:auto; border-radius:10px; border:1px solid var(--gray-200); }
    table { width:100%; border-collapse:collapse; font-size:.84rem; }
    th { background:var(--gray-100); padding:10px 14px; text-align:left; font-weight:600; font-size:.7rem; letter-spacing:.07em; text-transform:uppercase; color:var(--gray-600); border-bottom:1px solid var(--gray-200); white-space:nowrap; }
    td { padding:11px 14px; border-bottom:1px solid var(--gray-100); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--gray-50); }

    /* BADGES */
    .badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:.72rem; font-weight:600; }
    .badge-green  { background:var(--green-lt); color:#065F46; }
    .badge-orange { background:var(--orange-lt); color:#92400E; }
    .badge-red    { background:var(--red-lt); color:#991B1B; }
    .badge-blue   { background:var(--blue-lt); color:#1E40AF; }

    /* FOOTER */
    footer { text-align:center; padding:22px 16px; font-size:.72rem; color:var(--gray-400); border-top:1px solid var(--gray-200); display:flex; align-items:center; justify-content:center; gap:12px; }
    footer img { height:20px; object-fit:contain; opacity:.4; }

    @media(max-width:600px){
      header{padding:0 16px;}
      #hero{padding:28px 16px 24px;}
      .hero-name{font-size:1.7rem;}
      .hero-logo{display:none;}
      main{padding:24px 16px 60px;}
    }
  </style>
</head>

<script>
  document.getElementById('ts').textContent = new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'});

  const TOKEN    = "pat7tLz5WUrc3Odwz.c0a2961208c2bfdd9bdf85e437e8ae25f02077b6c3862d6b25a8391e97ed663d";
  const BASE_ID  = 'appfq4D7MKC9YxUZi';
  const TABLE_ID = 'tbl5BMqSd5Cf4W4u2';
  const F = {
    nome:'fldozJIYiQlBK8jOG', nReport:'fldEJIpHP7GvA3dDJ',
    telefono:'fldPQghlISr1fFm5W', circuito:'fldERKKmqWKL5luag',
    email:'fldhziz21sDsXyWdR', tipo:'fldrUFPTJkw7boeti',
    totRicevuta:'fldYvnEKHsSPNMykb', totDaPagare:'fldi71a69ULKelLce',
    contabilita:'fldw6XueNXLfhn87G'
  };

  function eur(v){if(v==null)return'—';return'€ '+Number(v).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function badge(val){
    if(!val)return'<span class="badge badge-orange">—</span>';
    const n=val.name||val;
    const m={'PAGATO':'badge-green','DA INCASSARE':'badge-orange','STORNATO':'badge-red'};
    return'<span class="badge '+(m[n]||'badge-blue')+'">'+n+'</span>';
  }

  async function loadData(){
    try{
      let all=[],offset=null;
      const fp=Object.values(F).map(id=>'fields[]='+id).join('&');
      const filt=encodeURIComponent('SEARCH(LOWER("perillo"),LOWER({'+F.nome+'}))');
      do{
        const url='https://api.airtable.com/v0/'+BASE_ID+'/'+TABLE_ID+'?'+fp+'&filterByFormula='+filt+(offset?'&offset='+offset:'');
        const res=await fetch(url,{headers:{Authorization:'Bearer '+TOKEN}});
        if(!res.ok){const e=await res.json();throw new Error(e.error?.message||'HTTP '+res.status);}
        const d=await res.json();
        all=all.concat(d.records||[]);offset=d.offset||null;
      }while(offset);

      document.getElementById('loading').style.display='none';
      if(!all.length){document.getElementById('error').textContent='Nessun record trovato.';document.getElementById('error').style.display='block';return;}
      render(all);
    }catch(e){
      document.getElementById('loading').style.display='none';
      document.getElementById('error').innerHTML='<strong>Errore Airtable:</strong> '+e.message;
      document.getElementById('error').style.display='block';
    }
  }

  function render(records){
    const first=records[0].cellValuesByFieldId;
    const tipo=first[F.tipo]?.name||first[F.tipo]||null;

    // HERO
    document.getElementById('hero-name').textContent=first[F.nome]||'Perillo Spa';
    const pills=document.getElementById('hero-pills');
    pills.innerHTML=(tipo?'<span class="pill pill-blue">🏷️ '+tipo+'</span>':'')+
      '<span class="pill pill-green">📋 '+records.length+' ricevut'+(records.length===1?'a':'e')+'</span>';

    // KPI
    const totRic=records.reduce((s,r)=>s+(r.cellValuesByFieldId[F.totRicevuta]||0),0);
    const totPag=records.reduce((s,r)=>s+(r.cellValuesByFieldId[F.totDaPagare]||0),0);
    const pagati=records.filter(r=>(r.cellValuesByFieldId[F.contabilita]?.name||'')==='PAGATO').length;
    document.getElementById('kpi-row').innerHTML=
      '<div class="kpi"><div class="kpi-val">'+records.length+'</div><div class="kpi-lbl">Ricevute totali</div></div>'+
      '<div class="kpi"><div class="kpi-val">'+eur(totRic)+'</div><div class="kpi-lbl">Totale ricevute</div></div>'+
      '<div class="kpi"><div class="kpi-val">'+eur(totPag)+'</div><div class="kpi-lbl">Totale da pagare</div></div>'+
      '<div class="kpi"><div class="kpi-val">'+pagati+'</div><div class="kpi-lbl">Ricevute pagate</div></div>';

    // ANAGRAFICA
    const tel=first[F.telefono]||null,email=first[F.email]||null,circ=first[F.circuito]||null;
    document.getElementById('grid-anagrafica').innerHTML=
      '<div class="card"><div class="card-lbl">Ragione sociale</div><div class="card-val">'+(first[F.nome]||'—')+'</div></div>'+
      '<div class="card"><div class="card-lbl">Tipo cliente</div><div class="card-val">'+(tipo||'<span class="empty">—</span>')+'</div></div>'+
      '<div class="card"><div class="card-lbl">Telefono</div><div class="card-val">'+(tel?'<a href="tel:'+tel+'" style="color:var(--blue);text-decoration:none">'+tel+'</a>':'<span class="empty">— non inserito</span>')+'</div></div>'+
      '<div class="card"><div class="card-lbl">E-mail</div><div class="card-val">'+(email?'<a href="mailto:'+email+'" style="color:var(--blue);text-decoration:none">'+email+'</a>':'<span class="empty">— non inserita</span>')+'</div></div>'+
      '<div class="card"><div class="card-lbl">Circuito pagamento</div><div class="card-val '+(circ?'mono':'')+'">'+(circ||'<span class="empty">— non inserito</span>')+'</div></div>'+
      '<div class="card"><div class="card-lbl">N. ricevute</div><div class="card-val mono">'+records.length+'</div></div>';

    // TABLE
    document.getElementById('table-body').innerHTML=records.map(function(rec,i){
      const c=rec.cellValuesByFieldId;
      const tr=c[F.tipo]?.name||c[F.tipo]||'—';
      return'<tr>'+
        '<td style="color:var(--gray-400);font-size:.8rem">'+(i+1)+'</td>'+
        '<td style="font-weight:600">'+(c[F.nReport]||'—')+'</td>'+
        '<td><span class="badge badge-blue">'+tr+'</span></td>'+
        '<td style="font-size:.82rem">'+(c[F.circuito]||'—')+'</td>'+
        '<td class="mono">'+eur(c[F.totRicevuta])+'</td>'+
        '<td class="mono" style="font-weight:600">'+eur(c[F.totDaPagare])+'</td>'+
        '<td>'+badge(c[F.contabilita])+'</td>'+
      '</tr>';
    }).join('');

    document.getElementById('main-content').style.display='block';
  }

  // Avvio automatico al caricamento
  loadData();
</script>
